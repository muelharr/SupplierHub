<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Gudang - SupplierHub B2B</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: '#1e40af', // Blue 800
                        primaryHover: '#1e3a8a',
                        secondary: '#f59e0b', // Amber 500
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }

        .modal-enter {
            opacity: 0;
            transform: scale(0.95);
        }

        .modal-enter-active {
            opacity: 1;
            transform: scale(1);
            transition: all 0.2s ease-out;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-800 font-sans h-screen flex overflow-hidden">

    <!-- Sidebar Admin -->
    <aside class="w-64 bg-slate-900 text-white flex flex-col hidden md:flex transition-all duration-300">
        <div class="h-16 flex items-center px-6 border-b border-slate-700">
            <i class="ph-fill ph-package text-secondary text-2xl mr-2"></i>
            <span class="text-xl font-bold tracking-wide">Supplier<span class="text-blue-400">Hub</span></span>
        </div>

        <nav class="flex-1 py-4 px-3 space-y-1 overflow-y-auto">
            <button onclick="navigate('dashboard')" id="nav-dashboard"
                class="nav-btn w-full flex items-center px-3 py-2.5 rounded-lg bg-primary text-white font-medium transition-colors">
                <i class="ph ph-squares-four text-xl mr-3"></i> Dashboard Admin
            </button>
            <button onclick="navigate('manajemen')" id="nav-manajemen"
                class="nav-btn w-full flex items-center px-3 py-2.5 rounded-lg text-slate-300 hover:bg-slate-800 hover:text-white font-medium transition-colors">
                <i class="ph ph-stack text-xl mr-3"></i> Manajemen Stok
            </button>
            <button onclick="navigate('pesanan')" id="nav-pesanan"
                class="nav-btn w-full flex items-center justify-between px-3 py-2.5 rounded-lg text-slate-300 hover:bg-slate-800 hover:text-white font-medium transition-colors">
                <div class="flex items-center">
                    <i class="ph ph-tray-arrow-down text-xl mr-3"></i> Pesanan Masuk
                </div>
                <span id="order-badge"
                    class="bg-red-500 text-white text-xs font-bold px-2 py-0.5 rounded-full hidden">0</span>
            </button>
            <button onclick="navigate('laporan')" id="nav-laporan"
                class="nav-btn w-full flex items-center px-3 py-2.5 rounded-lg text-slate-300 hover:bg-slate-800 hover:text-white font-medium transition-colors">
                <i class="ph ph-chart-line-up text-xl mr-3"></i> Laporan Tagihan
            </button>
        </nav>

    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col overflow-hidden relative">
        <!-- Topbar -->
        <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 z-10">
            <div class="flex items-center md:hidden">
                <button class="text-slate-500 hover:text-slate-700 focus:outline-none">
                    <i class="ph ph-list text-2xl"></i>
                </button>
                <span class="ml-3 text-lg font-bold text-slate-800">SupplierHub</span>
            </div>

            <div class="hidden md:flex items-center text-sm">
                <span
                    class="bg-slate-100 text-slate-600 py-1 px-3 rounded-full flex items-center border border-slate-200">
                    <span class="w-2 h-2 rounded-full bg-green-500 mr-2 animate-pulse"></span>
                    API Gateway Connected
                </span>
            </div>

            <div class="flex items-center space-x-4">
                <button class="relative text-slate-400 hover:text-slate-600">
                    <i class="ph ph-bell text-xl"></i>
                    <span id="bell-badge" class="absolute top-0 right-0 -mt-1 -mr-1 flex h-3 w-3 hidden">
                        <span
                            class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span>
                    </span>
                </button>
                <!-- Tombol Logout ke login.html -->
                <button onclick="window.location.href='login.html'"
                    class="text-red-500 hover:text-red-700 flex items-center text-sm font-medium transition-colors bg-red-50 hover:bg-red-100 px-3 py-1.5 rounded-lg">
                    <i class="ph ph-sign-out text-lg mr-1.5"></i> Keluar
                </button>
            </div>
        </header>

        <!-- Dynamic Content Area -->
        <div id="content-area" class="flex-1 overflow-y-auto p-4 md:p-6 bg-slate-50">
            <!-- Content diinjeksi via JS -->
        </div>
    </main>

    <!-- Modal Form CRUD Bahan Baku -->
    <div id="material-modal"
        class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center z-50 transition-opacity opacity-0">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg overflow-hidden transform scale-95 transition-transform flex flex-col"
            id="material-modal-content">
            <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h3 class="text-lg font-bold text-slate-800" id="material-modal-title">Tambah Bahan Baku Baru</h3>
                <button onclick="closeMaterialModal()" class="text-slate-400 hover:text-red-500 transition-colors">
                    <i class="ph ph-x text-xl"></i>
                </button>
            </div>

            <form onsubmit="saveMaterial(event)" class="p-6 overflow-y-auto max-h-[70vh]">
                <input type="hidden" id="material-id">

                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Nama Item</label>
                        <input type="text" id="material-name" required
                            class="w-full px-3 py-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-primary focus:outline-none text-sm"
                            placeholder="Contoh: Gula Merah Aren">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1">Kategori</label>
                            <select id="material-category" required
                                class="w-full px-3 py-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-primary focus:outline-none text-sm bg-white">
                                <option value="Bahan Pokok">Bahan Pokok</option>
                                <option value="Cair">Bahan Cair</option>
                                <option value="Bumbu & Rempah">Bumbu & Rempah</option>
                                <option value="Kemasan">Kemasan</option>
                                <option value="Lainnya">Lainnya</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1">Satuan</label>
                            <select id="material-unit" required
                                class="w-full px-3 py-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-primary focus:outline-none text-sm bg-white">
                                <option value="Kg">Kg</option>
                                <option value="Gram">Gram</option>
                                <option value="Liter">Liter</option>
                                <option value="Pcs">Pcs</option>
                                <option value="Tray">Tray</option>
                                <option value="Dus">Dus</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1">Harga B2B (Rp)</label>
                            <input type="number" id="material-price" required min="0"
                                class="w-full px-3 py-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-primary focus:outline-none text-sm"
                                placeholder="Contoh: 15000">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1">Stok Fisik Tersedia</label>
                            <input type="number" id="material-stock" required min="0"
                                class="w-full px-3 py-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-primary focus:outline-none text-sm"
                                placeholder="Contoh: 100">
                        </div>
                    </div>
                </div>

                <div class="mt-8 flex justify-end gap-3 pt-4 border-t border-slate-100">
                    <button type="button" onclick="closeMaterialModal()"
                        class="px-4 py-2 text-sm font-medium text-slate-600 bg-white border border-slate-300 hover:bg-slate-50 rounded-lg transition-colors">Batal</button>
                    <button type="submit"
                        class="px-4 py-2 text-sm font-medium text-white bg-primary hover:bg-primaryHover rounded-lg transition-colors shadow-sm">Simpan
                        Data</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Review Pesanan -->
    <div id="order-modal"
        class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center z-50 transition-opacity opacity-0">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-2xl overflow-hidden transform scale-95 transition-transform flex flex-col max-h-[90vh]"
            id="order-modal-content">
            <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <div>
                    <h3 class="text-lg font-bold text-slate-800">Review Pesanan Masuk</h3>
                    <p class="text-xs text-slate-500" id="modal-order-id">ORD-B2B-XXX</p>
                </div>
                <button onclick="closeOrderModal()" class="text-slate-400 hover:text-red-500 transition-colors">
                    <i class="ph ph-x text-xl"></i>
                </button>
            </div>
            <div class="p-6 overflow-y-auto flex-1 bg-white" id="modal-order-body"></div>
            <div class="px-6 py-4 border-t border-slate-100 bg-slate-50 flex justify-end gap-3" id="modal-order-footer">
                <button onclick="closeOrderModal()"
                    class="px-4 py-2 text-sm font-medium text-slate-600 bg-white border border-slate-300 hover:bg-slate-50 rounded-lg transition-colors">Batal</button>
                <button id="btn-approve"
                    class="px-4 py-2 text-sm font-medium text-white bg-primary hover:bg-primaryHover rounded-lg transition-colors shadow-sm flex items-center">
                    <i class="ph ph-paper-plane-tilt mr-2"></i> Approve & Kirim Payment Request
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <script>
        const CONFIG = { supplierFeePercentage: 0.03 };
        const formatRupiah = (number) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(number);

        // Data Master Bahan Baku (Dapat Dimodifikasi)
        let materials = [
            { id: 'MAT-001', name: 'Tepung Terigu Segitiga Biru', category: 'Bahan Pokok', price: 12000, stock: 500, unit: 'Kg', icon: 'ph-package' },
            { id: 'MAT-002', name: 'Gula Pasir Kristal Putih', category: 'Bahan Pokok', price: 16500, stock: 350, unit: 'Kg', icon: 'ph-cube' },
            { id: 'MAT-003', name: 'Minyak Goreng Sawit', category: 'Cair', price: 17000, stock: 200, unit: 'Liter', icon: 'ph-drop' },
            { id: 'MAT-004', name: 'Telur Ayam Horn', category: 'Bahan Pokok', price: 28000, stock: 150, unit: 'Tray', icon: 'ph-egg' },
            { id: 'MAT-005', name: 'Bawang Merah Brebes', category: 'Bumbu & Rempah', price: 35000, stock: 50, unit: 'Kg', icon: 'ph-plant' }
        ];

        let incomingOrders = [
            { id: 'ORD-B2B-901', source: 'Warung Bu Ani (Node POS)', date: '2026-04-24 10:15', status: 'pending', items: [{ materialId: 'MAT-001', qty: 20 }, { materialId: 'MAT-002', qty: 10 }] },
            { id: 'ORD-B2B-902', source: 'Toko Roti Makmur (Node Marketplace)', date: '2026-04-24 10:30', status: 'pending', items: [{ materialId: 'MAT-001', qty: 100 }, { materialId: 'MAT-004', qty: 20 }] }
        ];

        let orderHistory = [
            { id: 'ORD-B2B-881', source: 'Toko Roti Makmur', completedAt: '2026-04-20 10:35', totalAwal: 150000, feeSupplier: 4500, totalTagihan: 154500, status: 'Lunas', resi: 'SP-8810' }
        ];

        let currentReviewOrder = null;

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-green-600' : (type === 'info' ? 'bg-primary' : 'bg-red-600');
            const icon = type === 'success' ? 'ph-check-circle' : (type === 'info' ? 'ph-info' : 'ph-warning-circle');

            toast.className = `flex items-center text-white px-4 py-3 rounded-lg shadow-lg transform transition-all duration-300 translate-y-10 opacity-0 ${bgColor}`;
            toast.innerHTML = `<i class="ph ${icon} text-xl mr-2"></i><span class="text-sm font-medium">${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.classList.remove('translate-y-10', 'opacity-0'), 10);
            setTimeout(() => { toast.classList.add('opacity-0', 'translate-y-2'); setTimeout(() => toast.remove(), 300); }, 4000);
        }

        function updateBadges() {
            const orderBadge = document.getElementById('order-badge');
            const bellBadge = document.getElementById('bell-badge');
            if (incomingOrders.length > 0) {
                orderBadge.innerText = incomingOrders.length;
                orderBadge.classList.remove('hidden');
                bellBadge.classList.remove('hidden');
            } else {
                orderBadge.classList.add('hidden');
                bellBadge.classList.add('hidden');
            }
        }

        function navigate(view) {
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('bg-primary', 'text-white');
                btn.classList.add('text-slate-300', 'hover:bg-slate-800');
            });
            const activeBtn = document.getElementById(`nav-${view}`);
            if (activeBtn) {
                activeBtn.classList.remove('text-slate-300', 'hover:bg-slate-800');
                activeBtn.classList.add('bg-primary', 'text-white');
            }

            const contentArea = document.getElementById('content-area');
            if (view === 'dashboard') renderDashboard(contentArea);
            else if (view === 'manajemen') renderManajemen(contentArea);
            else if (view === 'pesanan') renderPesananMasuk(contentArea);
            else if (view === 'laporan') renderLaporan(contentArea);

            updateBadges();
        }

        // --- Modul CRUD Manajemen Stok ---

        function renderManajemen(container) {
            let tableRows = materials.map(m => `
                <tr class="border-b border-slate-100 hover:bg-slate-50 transition-colors">
                    <td class="py-3 px-4">
                        <div class="font-medium text-slate-800">${m.name}</div>
                        <div class="text-xs text-slate-500">${m.id}</div>
                    </td>
                    <td class="py-3 px-4 text-sm text-slate-600">${m.category}</td>
                    <td class="py-3 px-4 text-sm font-medium text-slate-800">${formatRupiah(m.price)} <span class="text-xs text-slate-500 font-normal">/${m.unit}</span></td>
                    <td class="py-3 px-4">
                        <span class="text-sm font-bold ${m.stock > 100 ? 'text-green-600' : (m.stock > 0 ? 'text-amber-600' : 'text-red-500')} px-2 py-1 bg-white border border-slate-200 rounded">${m.stock}</span>
                    </td>
                    <td class="py-3 px-4">
                        <div class="flex items-center gap-2">
                            <button onclick="openMaterialModal('${m.id}')" class="w-8 h-8 rounded bg-blue-50 text-blue-600 flex items-center justify-center hover:bg-blue-100 transition-colors" title="Edit">
                                <i class="ph ph-pencil-simple"></i>
                            </button>
                            <button onclick="deleteMaterial('${m.id}')" class="w-8 h-8 rounded bg-red-50 text-red-600 flex items-center justify-center hover:bg-red-100 transition-colors" title="Hapus">
                                <i class="ph ph-trash"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');

            container.innerHTML = `
                <div class="mb-6 flex flex-col sm:flex-row justify-between items-start sm:items-end gap-4">
                    <div>
                        <h1 class="text-2xl font-bold text-slate-800">Manajemen Stok Bahan Baku</h1>
                        <p class="text-slate-500 text-sm mt-1">Daftar item yang tersedia untuk diakses oleh aplikasi POS dan Marketplace.</p>
                    </div>
                    <button onclick="openMaterialModal()" class="bg-primary hover:bg-primaryHover text-white px-4 py-2.5 rounded-lg text-sm font-medium transition-colors flex items-center shadow-sm shrink-0">
                        <i class="ph ph-plus mr-2 text-lg"></i> Tambah Item Baru
                    </button>
                </div>
                <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse min-w-[700px]">
                            <thead>
                                <tr class="bg-slate-50 border-b border-slate-200 text-xs uppercase text-slate-500 font-semibold tracking-wider">
                                    <th class="py-3 px-4">Nama Item & ID</th>
                                    <th class="py-3 px-4">Kategori</th>
                                    <th class="py-3 px-4">Harga B2B</th>
                                    <th class="py-3 px-4">Stok Fisik Tersedia</th>
                                    <th class="py-3 px-4 w-24">Aksi</th>
                                </tr>
                            </thead>
                            <tbody>${materials.length > 0 ? tableRows : '<tr><td colspan="5" class="py-8 text-center text-slate-500">Belum ada bahan baku. Tambahkan data pertama Anda.</td></tr>'}</tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        function openMaterialModal(id = null) {
            const modal = document.getElementById('material-modal');
            const content = document.getElementById('material-modal-content');

            // Clear Form
            document.getElementById('material-id').value = '';
            document.getElementById('material-name').value = '';
            document.getElementById('material-category').value = 'Bahan Pokok';
            document.getElementById('material-price').value = '';
            document.getElementById('material-stock').value = '';
            document.getElementById('material-unit').value = 'Kg';

            if (id) {
                // Edit Mode
                const mat = materials.find(m => m.id === id);
                if (mat) {
                    document.getElementById('material-modal-title').innerText = 'Edit Bahan Baku';
                    document.getElementById('material-id').value = mat.id;
                    document.getElementById('material-name').value = mat.name;
                    document.getElementById('material-category').value = mat.category;
                    document.getElementById('material-price').value = mat.price;
                    document.getElementById('material-stock').value = mat.stock;
                    document.getElementById('material-unit').value = mat.unit;
                }
            } else {
                // Add Mode
                document.getElementById('material-modal-title').innerText = 'Tambah Bahan Baku Baru';
            }

            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.classList.add('opacity-100');
                content.classList.remove('scale-95');
                content.classList.add('scale-100');
            }, 10);
        }

        function closeMaterialModal() {
            const modal = document.getElementById('material-modal');
            const content = document.getElementById('material-modal-content');

            modal.classList.remove('opacity-100');
            modal.classList.add('opacity-0');
            content.classList.remove('scale-100');
            content.classList.add('scale-95');

            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 200);
        }

        function saveMaterial(e) {
            e.preventDefault();

            const id = document.getElementById('material-id').value;
            const name = document.getElementById('material-name').value;
            const category = document.getElementById('material-category').value;
            const price = parseInt(document.getElementById('material-price').value);
            const stock = parseInt(document.getElementById('material-stock').value);
            const unit = document.getElementById('material-unit').value;

            // Assign generic icon based on category (for UI simplicity)
            let icon = 'ph-package';
            if (category === 'Cair') icon = 'ph-drop';
            if (category === 'Bumbu & Rempah') icon = 'ph-plant';

            if (id) {
                // Update
                const index = materials.findIndex(m => m.id === id);
                if (index !== -1) {
                    materials[index] = { ...materials[index], name, category, price, stock, unit, icon };
                    showToast('Bahan baku berhasil diperbarui.', 'success');
                }
            } else {
                // Create
                const newId = 'MAT-' + Math.floor(100 + Math.random() * 900);
                materials.push({ id: newId, name, category, price, stock, unit, icon });
                showToast('Bahan baku baru berhasil ditambahkan.', 'success');
            }

            closeMaterialModal();
            renderManajemen(document.getElementById('content-area'));
        }

        function deleteMaterial(id) {
            if (confirm('Apakah Anda yakin ingin menghapus bahan baku ini dari gudang? Tindakan ini tidak dapat dibatalkan.')) {
                materials = materials.filter(m => m.id !== id);
                renderManajemen(document.getElementById('content-area'));
                showToast('Bahan baku telah dihapus.', 'info');
            }
        }

        // --- Render Views Lainnya ---

        function renderDashboard(container) {
            const totalRev = orderHistory.reduce((sum, o) => sum + o.totalTagihan, 0);

            container.innerHTML = `
                <div class="mb-6">
                    <h1 class="text-2xl font-bold text-slate-800">Dashboard Admin Supplier</h1>
                    <p class="text-slate-500 text-sm mt-1">Pemantauan logistik bahan baku dan status request pembayaran (B2B).</p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <div class="bg-white rounded-xl p-5 border border-slate-100 shadow-sm flex items-center">
                        <div class="w-12 h-12 rounded-lg bg-amber-100 text-amber-600 flex items-center justify-center text-2xl mr-4"><i class="ph-fill ph-tray-arrow-down"></i></div>
                        <div><p class="text-sm text-slate-500 font-medium mb-1">Pesanan Menunggu Review</p><h3 class="text-2xl font-bold text-slate-800">${incomingOrders.length} <span class="text-sm font-normal text-slate-500">Order</span></h3></div>
                    </div>
                    <div class="bg-white rounded-xl p-5 border border-slate-100 shadow-sm flex items-center">
                        <div class="w-12 h-12 rounded-lg bg-emerald-100 text-emerald-600 flex items-center justify-center text-2xl mr-4"><i class="ph-fill ph-money"></i></div>
                        <div><p class="text-sm text-slate-500 font-medium mb-1">Tagihan Terbayar</p><h3 class="text-xl font-bold text-slate-800">${formatRupiah(totalRev)}</h3></div>
                    </div>
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="bg-white rounded-xl p-6 border border-slate-100 shadow-sm flex flex-col">
                        <h3 class="text-lg font-bold text-slate-800 mb-4 flex items-center"><i class="ph-fill ph-lightning text-amber-500 mr-2"></i> Aksi Cepat</h3>
                        <div class="grid grid-cols-2 gap-4 flex-1">
                            <button onclick="navigate('pesanan')" class="p-4 bg-blue-50 hover:bg-blue-100 rounded-xl border border-blue-100 text-left transition-colors group flex flex-col justify-center">
                                <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-primary shadow-sm mb-3 group-hover:scale-110 transition-transform"><i class="ph ph-tray-arrow-down text-xl"></i></div>
                                <h4 class="font-bold text-slate-800 text-sm">Review Pesanan</h4><p class="text-xs text-slate-500 mt-1 line-clamp-2">Cek & proses order masuk dari Klien UMKM</p>
                            </button>
                            <button onclick="navigate('manajemen')" class="p-4 bg-emerald-50 hover:bg-emerald-100 rounded-xl border border-emerald-100 text-left transition-colors group flex flex-col justify-center">
                                <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-emerald-600 shadow-sm mb-3 group-hover:scale-110 transition-transform"><i class="ph ph-package text-xl"></i></div>
                                <h4 class="font-bold text-slate-800 text-sm">Kelola Stok</h4><p class="text-xs text-slate-500 mt-1 line-clamp-2">Tambah/edit harga & ketersediaan fisik</p>
                            </button>
                        </div>
                    </div>
                    <div class="bg-white rounded-xl p-6 border border-slate-100 shadow-sm">
                        <div class="flex justify-between items-center mb-5">
                            <h3 class="text-lg font-bold text-slate-800 flex items-center"><i class="ph-fill ph-activity text-primary mr-2"></i> Koneksi Ekosistem</h3>
                            <span class="px-2.5 py-1 bg-green-100 text-green-700 text-[10px] font-bold rounded-full flex items-center uppercase tracking-wider"><span class="w-1.5 h-1.5 bg-green-500 rounded-full mr-1.5 animate-pulse"></span> Terhubung</span>
                        </div>
                        <div class="space-y-4">
                            <div class="flex items-start p-3 rounded-lg hover:bg-slate-50 transition-colors"><div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-600 mr-4"><i class="ph-fill ph-arrows-left-right text-xl"></i></div><div><h4 class="text-sm font-bold text-slate-800">API Gateway</h4><p class="text-xs text-slate-500 mt-0.5">Endpoint aktif. Routing berjalan normal.</p></div></div>
                            <div class="flex items-start p-3 rounded-lg hover:bg-slate-50 transition-colors"><div class="w-10 h-10 rounded-full bg-emerald-50 flex items-center justify-center text-emerald-600 mr-4"><i class="ph-fill ph-bank text-xl"></i></div><div><h4 class="text-sm font-bold text-slate-800">SmartBank (Core)</h4><p class="text-xs text-slate-500 mt-0.5">Otorisasi pembayaran siap. Sinkronisasi ledger OK.</p></div></div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderPesananMasuk(container) {
            if (incomingOrders.length === 0) {
                container.innerHTML = `
                    <div class="mb-6"><h1 class="text-2xl font-bold text-slate-800">Pesanan Masuk (API)</h1></div>
                    <div class="text-center py-20 bg-white rounded-xl border border-slate-200 shadow-sm">
                        <div class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-4"><i class="ph ph-tray text-3xl text-slate-400"></i></div>
                        <h3 class="text-lg font-bold text-slate-700">Belum ada pesanan masuk baru.</h3><p class="text-sm text-slate-500 mt-1">Sistem sedang memantau request...</p>
                    </div>
                `;
                return;
            }

            let cardsHtml = incomingOrders.map(o => `
                <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-5 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 hover:border-primary transition-colors">
                    <div>
                        <div class="flex items-center gap-3 mb-1"><span class="px-2 py-0.5 bg-amber-100 text-amber-700 text-xs font-bold rounded animate-pulse">New Order</span><span class="text-xs text-slate-400 font-mono">${o.id}</span></div>
                        <h3 class="font-bold text-slate-800 text-lg">${o.source}</h3><p class="text-sm text-slate-500"><i class="ph ph-clock mr-1"></i> ${o.date} | ${o.items.length} macam bahan</p>
                    </div>
                    <button onclick="openReviewModal('${o.id}')" class="w-full md:w-auto bg-primary hover:bg-primaryHover text-white px-5 py-2.5 rounded-lg text-sm font-medium transition-colors flex items-center justify-center shadow-sm">
                        <i class="ph ph-magnifying-glass mr-2 text-lg"></i> Review & Proses
                    </button>
                </div>
            `).join('');

            container.innerHTML = `<div class="mb-6"><h1 class="text-2xl font-bold text-slate-800">Pesanan Masuk (API)</h1><p class="text-slate-500 text-sm mt-1">Verifikasi stok sebelum menerbitkan Payment Request.</p></div><div class="space-y-4">${cardsHtml}</div>`;
        }

        function renderLaporan(container) {
            let rows = orderHistory.map(o => `
                <tr class="border-b border-slate-100 hover:bg-slate-50"><td class="py-3 px-4"><div class="text-xs text-slate-500">${o.completedAt}</div><div class="font-mono text-sm font-bold text-slate-700">${o.id}</div></td><td class="py-3 px-4 text-sm font-medium text-slate-800">${o.source}</td><td class="py-3 px-4 text-sm font-bold text-slate-800">${formatRupiah(o.totalAwal)}</td><td class="py-3 px-4 text-sm font-bold text-green-600">+ ${formatRupiah(o.feeSupplier)}</td><td class="py-3 px-4"><span class="px-2 py-1 bg-green-100 text-green-700 rounded text-xs font-bold border border-green-200"><i class="ph-fill ph-check-circle mr-1"></i> ${o.status}</span></td><td class="py-3 px-4">${o.resi ? `<span class="font-mono text-sm font-bold text-primary flex items-center gap-1"><i class="ph ph-truck"></i>${o.resi}</span>` : `<span class="px-2 py-1 bg-slate-100 text-slate-400 rounded text-xs font-medium">Belum Ada Resi</span>`}</td></tr>
            `).join('');

            container.innerHTML = `<div class="mb-6"><h1 class="text-2xl font-bold text-slate-800">Laporan Tagihan</h1><p class="text-slate-500 text-sm mt-1">Riwayat payment request yang dilunasi.</p></div><div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden"><div class="overflow-x-auto"><table class="w-full text-left border-collapse min-w-[800px]"><thead><tr class="bg-slate-50 border-b border-slate-200 text-xs uppercase text-slate-500 font-semibold tracking-wider"><th class="py-3 px-4">Waktu & ID</th><th class="py-3 px-4">Klien (UMKM)</th><th class="py-3 px-4">Nilai Barang</th><th class="py-3 px-4">Pendapatan Fee</th><th class="py-3 px-4">Status</th><th class="py-3 px-4">Resi Pengiriman</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
        }

        // --- Logika Review Pesanan ---

        function openReviewModal(orderId) {
            currentReviewOrder = incomingOrders.find(o => o.id === orderId);
            if (!currentReviewOrder) return;
            document.getElementById('modal-order-id').innerText = `${orderId} - Dari: ${currentReviewOrder.source}`;

            let subtotal = 0; let isStockSufficient = true;
            let itemRows = currentReviewOrder.items.map(item => {
                const mat = materials.find(m => m.id === item.materialId);
                const itemTotal = mat.price * item.qty;
                subtotal += itemTotal;
                const stockStatusHtml = mat.stock >= item.qty ? `<span class="text-green-600 font-bold">Tersedia (${mat.stock})</span>` : `<span class="text-red-600 font-bold">Kurang (${mat.stock})</span>`;
                if (mat.stock < item.qty) isStockSufficient = false;

                return `<div class="flex justify-between items-center py-3 border-b border-slate-100 last:border-0"><div class="flex-1"><h4 class="text-sm font-bold text-slate-800">${mat.name}</h4><p class="text-xs text-slate-500">Permintaan: <span class="font-bold text-slate-700">${item.qty} ${mat.unit}</span> | Harga: ${formatRupiah(mat.price)}</p></div><div class="w-32 text-right text-xs"><p class="mb-1 text-slate-500">Cek Stok:</p>${stockStatusHtml}</div><div class="w-32 text-right"><p class="text-xs text-slate-500 mb-1">Subtotal:</p><p class="text-sm font-bold text-slate-800">${formatRupiah(itemTotal)}</p></div></div>`;
            }).join('');

            const feeSupplier = subtotal * CONFIG.supplierFeePercentage;
            const totalTagihan = subtotal + feeSupplier;

            document.getElementById('modal-order-body').innerHTML = `
                <div class="mb-4"><h4 class="text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">1. Validasi Stok Gudang</h4><div class="bg-slate-50 p-4 rounded-xl border border-slate-100">${itemRows}</div>${!isStockSufficient ? `<div class="mt-3 p-3 bg-red-50 border border-red-200 rounded-lg flex items-start gap-2 text-red-700 text-sm"><i class="ph-fill ph-warning-circle text-lg mt-0.5"></i><p><strong>Peringatan:</strong> Stok tidak mencukupi untuk memenuhi pesanan ini.</p></div>` : ''}</div>
                <div class="mb-4"><h4 class="text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">2. Kalkulasi Payment Request</h4><div class="bg-blue-50 border border-blue-100 p-4 rounded-xl"><div class="flex justify-between text-sm text-slate-600 mb-2"><span>Subtotal Nilai Barang:</span><span class="font-medium">${formatRupiah(subtotal)}</span></div><div class="flex justify-between text-sm text-slate-600 mb-3 border-b border-blue-200 pb-2"><span>Fee Supplier (3%):</span><span class="font-bold text-green-600">+ ${formatRupiah(feeSupplier)}</span></div><div class="flex justify-between items-center mt-2"><span class="font-bold text-slate-800">Total Tagihan:</span><span class="font-bold text-primary text-xl">${formatRupiah(totalTagihan)}</span></div></div></div>
                <div><h4 class="text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">3. Nomor Resi Pengiriman</h4><div class="flex items-center gap-3 border border-slate-200 rounded-lg p-3 bg-slate-50 focus-within:border-primary focus-within:ring-1 focus-within:ring-primary transition-all"><i class="ph ph-truck text-slate-400 text-xl shrink-0"></i><input type="text" id="input-resi-pengiriman" class="flex-1 bg-transparent outline-none text-sm text-slate-800 placeholder-slate-400 font-mono" placeholder="Contoh: SP-1234" maxlength="20"></div><p class="text-xs text-slate-400 mt-1.5 flex items-center gap-1"><i class="ph ph-info"></i> Opsional. Isi jika barang sudah siap dikirim. Format: SP-XXXX</p></div>
            `;

            const btnApprove = document.getElementById('btn-approve');
            if (isStockSufficient) {
                btnApprove.classList.remove('opacity-50', 'cursor-not-allowed');
                btnApprove.disabled = false;
                btnApprove.onclick = () => processPaymentRequest(subtotal, feeSupplier, totalTagihan);
            } else {
                btnApprove.classList.add('opacity-50', 'cursor-not-allowed');
                btnApprove.disabled = true;
            }

            const modal = document.getElementById('order-modal');
            const content = document.getElementById('order-modal-content');
            modal.classList.remove('hidden'); modal.classList.add('flex');
            setTimeout(() => { modal.classList.remove('opacity-0'); modal.classList.add('opacity-100'); content.classList.remove('scale-95'); content.classList.add('scale-100'); }, 10);
        }

        function closeOrderModal() {
            const modal = document.getElementById('order-modal');
            const content = document.getElementById('order-modal-content');
            modal.classList.remove('opacity-100'); modal.classList.add('opacity-0');
            content.classList.remove('scale-100'); content.classList.add('scale-95');
            setTimeout(() => { modal.classList.add('hidden'); modal.classList.remove('flex'); currentReviewOrder = null; }, 200);
        }

        function processPaymentRequest(subtotal, feeSupplier, totalTagihan) {
            const resiInput = document.getElementById('input-resi-pengiriman');
            const resi = resiInput && resiInput.value.trim() ? resiInput.value.trim() : null;
            showToast('Memproses Payment Request...', 'info');
            closeOrderModal();
            setTimeout(() => {
                currentReviewOrder.items.forEach(item => { const mat = materials.find(m => m.id === item.materialId); if (mat) mat.stock -= item.qty; });
                const f = new Date();
                const timeStr = `${f.getFullYear()}-${String(f.getMonth() + 1).padStart(2, '0')}-${String(f.getDate()).padStart(2, '0')} ${String(f.getHours()).padStart(2, '0')}:${String(f.getMinutes()).padStart(2, '0')}`;
                orderHistory.unshift({ id: currentReviewOrder.id, source: currentReviewOrder.source, completedAt: timeStr, totalAwal: subtotal, feeSupplier: feeSupplier, totalTagihan: totalTagihan, status: 'Lunas', resi: resi });
                incomingOrders = incomingOrders.filter(o => o.id !== currentReviewOrder.id);
                showToast(`Payment Request ${currentReviewOrder.id} lunas.`, 'success');
                setTimeout(() => navigate('laporan'), 800);
            }, 1500);
        }

        window.onload = () => { updateBadges(); navigate('dashboard'); };
    </script>
</body>

</html>
