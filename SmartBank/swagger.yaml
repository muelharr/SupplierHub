openapi: 3.0.3
info:
  title: SmartBank Mock API Specification
  description: Dokumentasi API Kontrak Layanan Finansial SmartBank sesuai dengan panduan Aplikasi.docx.
  version: 1.0.0
servers:
  - url: http://localhost/SmartBank/api
    description: Laragon Local Server
paths:
  /smartbank/registrasi_login_user:
    post:
      summary: Autentikasi dan Registrasi User
      description: Login atau register akun nasabah bank untuk mendapatkan token JWT.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - action
              properties:
                email:
                  type: string
                  format: email
                  example: umkm@b2blink.com
                password:
                  type: string
                  example: password123
                name:
                  type: string
                  example: Warung Bu Ani
                action:
                  type: string
                  enum: [login, register]
                  example: login
      responses:
        '200':
          description: Login berhasil
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse'
        '201':
          description: Registrasi berhasil
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse'
        '400':
          description: Input tidak valid
        '401':
          description: Email atau password salah

  /smartbank/manajemen_saldo:
    get:
      summary: Cek Saldo dan Riwayat Nasabah
      description: Mendapatkan saldo saat ini beserta 15 transaksi terakhir nasabah.
      parameters:
        - name: user_id
          in: query
          required: true
          schema:
            type: integer
          example: 2
      responses:
        '200':
          description: Saldo berhasil diambil
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse'
    post:
      summary: Top-Up Saldo (Admin Only)
      description: Menambahkan saldo ke akun nasabah tertentu (simulasi deposit).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_id
                - amount
              properties:
                user_id:
                  type: integer
                  example: 2
                amount:
                  type: integer
                  example: 500000
                source_app:
                  type: string
                  example: SmartBank
      responses:
        '200':
          description: Top-up sukses
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse'

  /smartbank/pembayaran_transaksi:
    post:
      summary: Pembayaran Transaksi Belanja B2B
      description: Memotong saldo pembeli (UMKM), menambahkan saldo penjual (Supplier), mengirimkan fee bank 1% ke rekening bank admin.
      parameters:
        - name: X-Source-App
          in: header
          required: true
          schema:
            type: string
          example: SupplierHub
        - name: X-Gateway-ID
          in: header
          required: true
          schema:
            type: string
          example: gateway-b2b-link
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_id
                - amount
                - fee_supplier
              properties:
                user_id:
                  type: integer
                  description: ID nasabah UMKM (Pembayar)
                  example: 2
                to_user_id:
                  type: integer
                  description: ID nasabah Supplier (Penerima)
                  example: 3
                amount:
                  type: integer
                  description: Nilai belanja barang bersih
                  example: 100000
                fee_supplier:
                  type: integer
                  description: Fee/Margin supplier (3%)
                  example: 3000
                description:
                  type: string
                  example: Pembayaran bahan baku terigu
                source_app:
                  type: string
                  example: SupplierHub
      responses:
        '200':
          description: Pembayaran berhasil diproses
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse'
        '402':
          description: Saldo tidak mencukupi (termasuk total tagihan + fee bank 1%)

  /smartbank/transfer_antar_user:
    post:
      summary: Transfer Saldo Antar User
      description: Mentransfer sejumlah dana antar sesama rekening nasabah SmartBank (dikenakan fee bank 1%).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - from_user_id
                - to_user_id
                - amount
              properties:
                from_user_id:
                  type: integer
                  example: 2
                to_user_id:
                  type: integer
                  example: 3
                amount:
                  type: integer
                  example: 50000
                description:
                  type: string
                  example: Transfer pinjam modal
      responses:
        '200':
          description: Transfer berhasil
        '402':
          description: Saldo pengirim tidak cukup

  /smartbank/pinjaman_loan:
    post:
      summary: Pengajuan Pinjaman Modal (Loan)
      description: Mengajukan pinjaman ke SmartBank dengan bunga bulanan 2%. Maksimal pinjaman Rp 5.000.000.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_id
                - amount
              properties:
                user_id:
                  type: integer
                  example: 2
                amount:
                  type: integer
                  example: 1000000
      responses:
        '200':
          description: Pinjaman disetujui & saldo dicairkan

  /smartbank/pajak_biaya:
    post:
      summary: Pemotongan Pajak Transaksi
      description: Memotong saldo nasabah secara manual/otomatis untuk setoran pajak pembangunan daerah (default 0.5%).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_id
                - amount
              properties:
                user_id:
                  type: integer
                  example: 2
                amount:
                  type: integer
                  example: 100000
                tax_rate:
                  type: number
                  example: 0.005
      responses:
        '200':
          description: Pajak dipotong sukses

  /smartbank/ledger_transaksi:
    get:
      summary: Riwayat Ledger Global (Audit/Admin)
      description: Menampilkan daftar riwayat mutasi keuangan global dari ledger SmartBank (Aturan #7).
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Sukses mengambil data ledger

  /smartbank/biaya_layanan_bank:
    get:
      summary: Informasi Kebijakan Biaya Layanan
      description: Menampilkan konfigurasi bunga pinjaman, limit transfer, dan persentase fee bank (1%) & pajak (0.5%).
      responses:
        '200':
          description: Sukses mengambil info biaya

components:
  schemas:
    StandardResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        message:
          type: string
          example: Operasi berhasil
        data:
          type: object
        meta:
          type: object
          properties:
            smartbank_version:
              type: string
              example: 1.0.0
            processed_at:
              type: string
              example: '2026-06-09 10:00:00'
            request_id:
              type: string
              example: SB-REQ-AB12CD34
